<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Jokenpo - Jogue Pedra, Papel e Tesoura contra o computador">
    <link rel="stylesheet" href="./src/css/styles.css">
    <link rel="stylesheet" href="./src/css/darkmode.css">
    <link rel="stylesheet" href="./src/css/jokenpo.css">
    <link rel="shortcut icon" href="./img/icone-pedra-papel-tesoura.png" type="image/x-icon">
    <title>Pedra Papel Tesoura</title>
</head>

<body>
    <main class="card-jokenpo" role="main">
        <header class="game-header">
            <h1>Jokenpo</h1>
            <p class="player-greeting" id="player-greeting"></p>
        </header>

        <section class="scoreboard" aria-label="Placar">
            <div class="score-item">
                <span class="score-label" id="player-score-label">Você</span>
                <span class="score-value" id="player-score">0</span>
            </div>
            <div class="score-divider" aria-hidden="true">×</div>
            <div class="score-item">
                <span class="score-label">CPU</span>
                <span class="score-value" id="cpu-score">0</span>
            </div>
        </section>

        <section class="battle-area" aria-label="Arena de batalha" aria-live="polite">
            <div class="choice-display player-choice" aria-label="Sua escolha">
                <span class="choice-label">Você</span>
                <div class="choice-img-wrapper" id="player-choice-display">
                    <span class="choice-placeholder">?</span>
                </div>
            </div>

            <div class="vs-badge" aria-hidden="true">VS</div>

            <div class="choice-display cpu-choice" aria-label="Escolha da CPU">
                <span class="choice-label">CPU</span>
                <div class="choice-img-wrapper" id="cpu-choice-display">
                    <span class="choice-placeholder">?</span>
                </div>
            </div>
        </section>

        <div class="result-message" id="result-message" role="alert" aria-live="assertive"></div>

        <section class="options-game" aria-label="Escolha sua jogada">
            <p class="choose-prompt">Escolha sua jogada:</p>
            <div class="btn-game-group" role="group" aria-label="Opções de jogo">
                <button class="btn-game" id="pedraBtn" aria-label="Pedra" data-choice="pedra">
                    <img src="img/pedra-btn.png" alt="Pedra">
                    <span class="btn-game-label">Pedra</span>
                </button>
                <button class="btn-game" id="papelBtn" aria-label="Papel" data-choice="papel">
                    <img src="img/papel-btn.png" alt="Papel">
                    <span class="btn-game-label">Papel</span>
                </button>
                <button class="btn-game" id="tesouraBtn" aria-label="Tesoura" data-choice="tesoura">
                    <img src="img/tesoura-btn.png" alt="Tesoura">
                    <span class="btn-game-label">Tesoura</span>
                </button>
            </div>
        </section>

        <footer class="game-footer">
            <button class="btn-reset" id="btn-reset" aria-label="Reiniciar placar">
                Reiniciar placar
            </button>
            <a href="index.html" class="btn-back" aria-label="Voltar para o início">
                ← Voltar
            </a>
        </footer>
    </main>

    <script src="./src/js/Animations/animations.js"></script>
    <script src="./src/js/game.js"></script>
</body>

</html>
